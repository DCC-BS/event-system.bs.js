name: Publish Package
on:
    workflow_dispatch:

permissions:
    id-token: write # Required for OIDC
    contents: write

jobs:
    publish:
        uses: DCC-BS/ci-workflows/.github/workflows/npm-publish.yml@d56b755ec3877da25146ac5f34a2b4003ff6339d # v8
        with:
            install_command: bun install
            build_command: bun run generate
            prepack_command: bun run prepack
